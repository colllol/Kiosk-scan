<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu cầu cắm thẻ căn cước</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon-wrapper {
            margin-bottom: 30px;
        }

        .id-card-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .id-card-icon svg {
            width: 100%;
            height: 100%;
            fill: #667eea;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .description {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .instruction-box {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
            border-left: 4px solid #667eea;
        }

        .instruction-step {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            text-align: left;
        }

        .instruction-step:last-child {
            margin-bottom: 0;
        }

        .step-number {
            width: 36px;
            height: 36px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }

        .step-text {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .btn-navigate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 48px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-decoration: none;
            display: inline-block;
        }

        .btn-navigate:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-navigate:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            .title {
                font-size: 24px;
            }

            .description {
                font-size: 16px;
            }

            .id-card-icon {
                width: 80px;
                height: 80px;
            }

            .btn-navigate {
                padding: 15px 36px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon-wrapper">
            <div class="id-card-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/>
                </svg>
            </div>
        </div>

        <h1 class="title">📋 Yêu cầu cắm thẻ căn cước</h1>
        
        <p class="description">
            Vui lòng cắm thẻ căn cước công dân vào đầu đọc thẻ trước khi tiếp tục
        </p>

        <div class="instruction-box">
            <div class="instruction-step">
                <div class="step-number">1</div>
                <div class="step-text">Cắm thẻ căn cước vào đầu đọc thẻ</div>
            </div>
            <div class="instruction-step">
                <div class="step-number">2</div>
                <div class="step-text">Đợi hệ thống đọc thông tin từ thẻ</div>
            </div>
            <div class="instruction-step">
                <div class="step-number">3</div>
                <div class="step-text">Nhấn nút "Tiếp tục" để thực hiện các bước tiếp theo</div>
            </div>
        </div>

        <button class="btn-navigate" id="btnNavigate" onclick="navigateToScan()">
            🚀 Tiếp tục
        </button>
    </div>

    <script>
        function navigateToScan() {
            window.location.href = "index3.html";
        }

        // Tự động focus vào button khi trang load xong
        window.addEventListener('load', () => {
            document.getElementById('btnNavigate').focus();
        });

        // Hỗ trợ phím Enter để nhấn button
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                navigateToScan();
            }
        });
    </script>
</body>

</html>
