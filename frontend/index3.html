<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="referrer" content="no-referrer-when-downgrade">

    <title>Kiosk lấy số thứ tự</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Features section */
        .features-section {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85));
            padding: clamp(10px, 2vw, 24px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-title {
            font-size: clamp(22px, 3vw, 36px);
            font-weight: 600;
            margin-bottom: clamp(10px, 2vh, 20px);
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1a1a1a;
            flex-shrink: 0;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, clamp(180px, 24vw, 320px)), 1fr));
            grid-auto-rows: minmax(0, 1fr);
            gap: clamp(10px, 1.8vw, 20px);
            flex: 1;
            min-height: 0;
            align-content: stretch;
        }

        .feature-card {
            background: white;
            border: 2px solid #2196F3;
            border-radius: 12px;
            padding: clamp(12px, 2.4vw, 30px);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 1.8vh, 15px);
            min-height: 0;
            overflow: hidden;
        }

        .feature-card:hover {
            background: #2196F3;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
        }

        .feature-card:hover .feature-icon {
            background: white;
        }

        .feature-icon {
            width: clamp(42px, 7vmin, 64px);
            height: clamp(42px, 7vmin, 64px);
            background: #2196F3;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(22px, 4vmin, 32px);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .feature-card h1,
        .feature-card h3 {
            font-size: clamp(24px, 4vmin, 48px);
            font-weight: 700;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }

        .feature-card p {
            color: #666;
            font-size: clamp(12px, 1.5vw, 14px);
        }

        .feature-card:hover p {
            color: #e0e0e0;
        }

        .external-link::after {
            content: ' ↗';
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .features-section {
                padding: 12px;
            }
            .features-grid {
                grid-template-columns: repeat(auto-fit, minmax(min(100%, 180px), 1fr));
            }
            .feature-card {
                padding: 14px;
            }
        }

        @media (max-height: 650px) {
            .features-section {
                padding: 10px;
            }
            .section-title {
                margin-bottom: 8px;
            }
            .features-grid {
                gap: 10px;
            }
            .feature-card {
                gap: 6px;
                padding: 10px;
            }
            .feature-icon {
                width: 38px;
                height: 38px;
                font-size: 20px;
            }
            .feature-card h1,
            .feature-card h3 {
                font-size: clamp(18px, 3vmin, 32px);
            }
        }

        @media (max-height: 420px) and (min-width: 900px) {
            .features-grid {
                grid-template-columns: repeat(5, minmax(0, 1fr));
            }
            .feature-icon {
                width: 34px;
                height: 34px;
                font-size: 18px;
            }
            .feature-card h1,
            .feature-card h3 {
                font-size: clamp(18px, 2.4vmin, 24px);
            }
        }
    </style>
</head>

<body>
        <!-- Features Section -->
        <div class="features-section">
            <div class="section-title">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2196F3" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1" />
                    <rect x="14" y="3" width="7" height="7" rx="1" />
                    <rect x="3" y="14" width="7" height="7" rx="1" />
                    <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
                Chức năng
            </div>

               <div class="features-grid">
                <div class="feature-card" data-service-id="99" data-service-name="Tư pháp - Hộ tịch">
                    <div class="feature-icon">⚖️</div>
                    <h1>Tư pháp - Hộ tịch </br> ( Cường) </h1>
                    <h1>QUẦY SỐ 1</h1>
                </div>

                <div class="feature-card" data-service-id="2" data-service-name="Tư pháp - Hộ tịch">
                    <div class="feature-icon">⚖️</div>
                    <h1>Tư pháp - Hộ tịch </br>( Nga) </h1>
                    <h1>QUẦY SỐ 2</h1>
                </div>

                <div class="feature-card" data-service-id="3" data-service-name="Địa chính - Xây dựng">
                    <div class="feature-icon">🏗️</div>
                    <h1>Tài nguyên - Đất đai - Môi trường </br>( Bạch Trang) </h1>
                    <h1>QUẦY SỐ 3</h1>
                </div>

                    <div class="feature-card" data-service-id="4" data-service-name="Kinh tế - Xã hội">
                    <div class="feature-icon">📊</div>
                    <h1>Kinh tế - Kinh doanh </br>( Phương) </h1>
                    <h1>QUẦY SỐ 4</h1>
                </div>

                <div class="feature-card" data-service-id="5" data-service-name="Văn hóa - Thông tin">
                    <div class="feature-icon">🎭</div>
                    <h1>Văn hóa - Xã hội - Chính sách </br>( Huyền Trang)</h1>
                    <h1>QUẦY SỐ 5</h1>
                </div>

            </div>
        </div>

        <script>
            document.querySelectorAll('.feature-card[data-service-id]').forEach(card => {
                card.addEventListener('click', async function () {
                    const serviceId = this.dataset.serviceId;
                    const serviceName = this.dataset.serviceName;
                    const TICKET_API = 'http://localhost:5000/api/ticket';
                    try {
                        const response = await fetch(TICKET_API, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ serviceId: parseInt(serviceId), serviceName })
                        });
                        // if (response.ok) {
                        //     const data = await response.json();
                        //     alert(`Số thứ tự: ${data.ticketNumber}\nDịch vụ: ${serviceName}\n\nĐã gửi lệnh in!`);
                        // } else {
                        //     const error = await response.json();
                        //     alert(`Lỗi: ${error.message || 'Không thể lấy số thứ tự'}`);
                        // }
                    } catch (error) {
                        alert(`Lỗi kết nối: ${error.message}`);
                    }
                });
            });
        </script>
</body>
</html>
